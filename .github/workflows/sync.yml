name: Sync Kivo Data

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:
    inputs:
      include_details:
        description: "Fetch per-id detail JSON files"
        required: false
        default: true
        type: boolean
      include_disabled_details:
        description: "Also fetch details for large resources such as timeline"
        required: false
        default: false
        type: boolean
      runner:
        description: "Runner label for this run"
        required: false
        default: "ubuntu-latest"
        type: choice
        options:
          - ubuntu-latest
          - self-hosted
      fail_on_sync_error:
        description: "Fail the workflow instead of warning when Kivo sync cannot be reached"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: sync-kivo-data-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ${{ github.event.inputs.runner || vars.SYNC_RUNNER || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Sync data
        id: sync_data
        shell: bash
        run: |
          git fetch origin main
          git rebase origin/main

          args=()
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event.inputs.include_details }}" = "true" ]; then
            args+=(--include-details)
          fi
          if [ "${{ github.event.inputs.include_disabled_details }}" = "true" ]; then
            args+=(--include-disabled-details)
          fi

          set +e
          python scripts/sync.py "${args[@]}"
          sync_exit=$?
          set -e

          if [ "${sync_exit}" -ne 0 ]; then
            echo "sync_skipped=true" >> "${GITHUB_OUTPUT}"
            echo "::warning::Kivo sync failed with exit code ${sync_exit}. This is often caused by Kivo rejecting or timing out GitHub-hosted runner traffic. Skipping commit."
            if [ "${{ github.event.inputs.fail_on_sync_error }}" = "true" ]; then
              exit "${sync_exit}"
            fi
            exit 0
          fi

          python scripts/validate.py
          echo "sync_skipped=false" >> "${GITHUB_OUTPUT}"
      - name: Commit changes
        if: steps.sync_data.outputs.sync_skipped != 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git rebase --autostash origin/main
          python scripts/validate.py

          if git diff --quiet -- data; then
            echo "No data changes."
            exit 0
          fi
          git add data
          sync_time="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git commit -m "chore: auto sync kivo data ${sync_time}"
          git push origin HEAD:main
