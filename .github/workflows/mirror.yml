name: Mirror Repositories

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Push configured mirrors
        shell: bash
        env:
          MIRROR_PUSH_URLS: ${{ secrets.MIRROR_PUSH_URLS }}
        run: |
          if [ -z "${MIRROR_PUSH_URLS}" ]; then
            echo "No mirror remotes configured."
            exit 0
          fi

          mirror_index=0
          while IFS= read -r mirror_url; do
            if [ -z "${mirror_url}" ] || [[ "${mirror_url}" == \#* ]]; then
              continue
            fi

            mirror_index=$((mirror_index + 1))
            remote_name="mirror-${mirror_index}"
            echo "Pushing ${remote_name}"
            git remote add "${remote_name}" "${mirror_url}"
            git push "${remote_name}" HEAD:main
            git remote remove "${remote_name}"
          done <<< "${MIRROR_PUSH_URLS}"
